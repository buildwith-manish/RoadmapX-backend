name: Keep Render Alive

on:
  schedule:
    - cron: '*/20 * * * *'  # every 20 mins
  workflow_dispatch:          # allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          curl -s https://roadmapx-backend-3qmc.onrender.com/me
          echo "Pinged at $(date)"
